# StadiumPulse — local development orchestration
# One-command onboarding: `docker compose up --build`

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stadiumpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stadiumpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_env}
      POSTGRES_DB: ${POSTGRES_DB:-stadiumpulse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stadiumpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stadiumpulse-net

  redis:
    image: redis:7-alpine
    container_name: stadiumpulse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stadiumpulse-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadiumpulse-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stadiumpulse:change_me_in_local_env@postgres:5432/stadiumpulse}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - stadiumpulse-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadiumpulse-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - stadiumpulse-net
    command: npm run dev

networks:
  stadiumpulse-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
