databases:
  - name: stadiumpulse-db
    databaseName: stadiumpulse
    user: stadiumpulse
    plan: free

services:
  # 1. Redis
  - type: redis
    name: stadiumpulse-redis
    plan: free
    ipAllowList: []

  # 2. Backend (Web Service)
  - type: web
    name: stadiumpulse-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stadiumpulse-db
          property: connectionString
      
      - key: REDIS_URL
        fromService:
          type: redis
          name: stadiumpulse-redis
          property: connectionString

      # `sync: false` is Render's actual mechanism for secrets that must be
      # entered manually in the dashboard: it tells Render to leave whatever
      # value is already set there alone. The previous checked-in placeholder
      # strings were a real risk -- re-applying this blueprint would have
      # overwritten a real, already-configured secret with literal placeholder
      # text on the next sync, and `Settings.reject_weak_production_secrets`
      # (core/config.py) will now refuse to boot at all if that ever happens.
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

      - key: API_V1_PREFIX
        value: /api/v1
      # Was "*" -- with allow_credentials=True (main.py's CORSMiddleware),
      # a wildcard origin means any website can call the authenticated API
      # surface with a stolen/leaked bearer token; scope it to the actual
      # deployed frontend origin instead.
      - key: CORS_ORIGINS
        value: "https://stadiumpulse-frontend.onrender.com"
      - key: ENV
        value: production
      - key: HTTP_RATE_LIMIT
        value: "30/minute"

  # 3. Frontend (Web Service)
  - type: web
    name: stadiumpulse-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://stadiumpulse-backend.onrender.com/api/v1"
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://stadiumpulse-backend.onrender.com/ws"
