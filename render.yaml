services:
  # 1. Database (Private Service with pgvector)
  - type: pserv
    name: stadiumpulse-db
    env: docker
    dockerfilePath: ./Dockerfile.db
    disk:
      name: stadiumpulse-db-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_USER
        value: stadiumpulse
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: stadiumpulse

  # 2. Redis (Private Service)
  - type: pserv
    name: stadiumpulse-redis
    env: docker
    dockerfilePath: ./Dockerfile.redis
    disk:
      name: stadiumpulse-redis-data
      mountPath: /data
      sizeGB: 1

  # 3. Backend (Web Service)
  - type: web
    name: stadiumpulse-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      # Database connection constructed from the DB service
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: stadiumpulse-db
          envVarKey: POSTGRES_PASSWORD
        value: postgresql+asyncpg://stadiumpulse:${POSTGRES_PASSWORD}@stadiumpulse-db:5432/stadiumpulse
      
      # Redis connection constructed from the Redis service
      - key: REDIS_URL
        value: redis://stadiumpulse-redis:6379/0

      # Set these manually in the Render Dashboard after deployment
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
        
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        # Allow frontend to connect to backend
        value: "*" # Update this to your frontend URL once deployed for stricter security

  # 4. Frontend (Web Service)
  - type: web
    name: stadiumpulse-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      # The frontend needs the backend's external URL at build time
      - key: NEXT_PUBLIC_API_URL
        value: "https://stadiumpulse-backend.onrender.com/api/v1"
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://stadiumpulse-backend.onrender.com/ws"
