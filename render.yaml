databases:
  - name: stadiumpulse-db
    databaseName: stadiumpulse
    user: stadiumpulse
    plan: free

services:
  # 1. Redis
  - type: redis
    name: stadiumpulse-redis
    plan: free
    ipAllowList: []

  # 2. Backend (Web Service)
  - type: web
    name: stadiumpulse-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stadiumpulse-db
          property: connectionString
      
      - key: REDIS_URL
        fromService:
          type: redis
          name: stadiumpulse-redis
          property: connectionString

      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
        
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: "*"

  # 3. Frontend (Web Service)
  - type: web
    name: stadiumpulse-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://stadiumpulse-backend.onrender.com/api/v1"
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://stadiumpulse-backend.onrender.com/ws"
